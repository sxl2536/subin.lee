# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Subin"                                # Your name
  image: img/my_image.jpg
  
  favicon: img/favicon.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - text: "Projects"
        href: projects/index.qmd
      - text: "Photography"
        href: photography/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Moving Beyond Statistical Significance"
        href: pvalue/index.qmd
        
    # your social media handles
    right:
      - icon: linkedin
        href: https://www.linkedin.com/in/lee22-subin/
      - icon: envelope
        aria-label: email
        href: "mailto:mail.sxl2536@case.edu"  
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
 
project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - minty
      - $primary:$teal!default;
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true